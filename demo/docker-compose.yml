services:
  postgres:
    image: postgres:15-alpine
    container_name: jpmc_ledger_db

    environment:
      POSTGRES_DB: ledgerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: